{% extends "base.html" %}

{% block gallery %}
<div class="max-w-7xl mx-auto py-12 px-4">

    <h1 class="text-3xl font-bold text-blue-900 mb-8">
        Nos <span class="text-yellow-400">Galeries</span>
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for gallery in galleries %}
        <a href="{% url 'gallery-detail' gallery.pk %}" 
           class="relative bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition transform hover:-translate-y-1">

            {% if gallery.images.first %}
            <img src="{{ gallery.images.first.image.url }}" 
                 alt="{{ gallery.titre }}"
                 class="w-full h-64 object-cover">
            {% else %}
            <div class="w-full h-64 bg-gray-200 flex items-center justify-center">
                <span class="text-gray-700">Pas d'image</span>
            </div>
            {% endif %}

            <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/60 to-transparent p-4">
                <h2 class="text-xl font-bold text-white">{{ gallery.titre }}</h2>
                <p class="text-gray-200 text-sm mt-1">{{ gallery.description|truncatechars:60 }}</p>
            </div>
        </a>
        {% empty %}
        <p class="text-center text-gray-600">Aucune galerie disponible.</p>
        {% endfor %}

    </div>
</div>
{% endblock %}
