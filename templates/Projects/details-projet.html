{% extends "base.html" %}
{% block details-projet %}

<div class="max-w-6xl mx-auto py-12 px-4 space-y-8" style="padding-top: 140px;">

  <a href="{% url 'projets-list' %}"
     class="inline-flex items-center gap-2 mb-6
            bg-white/20 backdrop-blur-md border border-white/30
            text-blue-900 px-4 py-2 rounded-xl
            hover:bg-blue-900 hover:text-white transition font-semibold">
    <i class="fa-solid fa-arrow-left"></i> Retour aux projets
  </a>

  <h1 class="text-3xl font-bold text-blue-900 mb-6">{{ projet.titre }}</h1>

  <p class="text-blue-900 mb-6">{{ projet.description }}</p>

  <!-- Galerie -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for photo in photos %}
      <div class="overflow-hidden rounded-xl shadow-lg">
        <img src="{{ photo.image.url }}" alt="{{ photo.description }}"
             class="w-full h-64 object-cover hover:scale-105 transition duration-300">
        {% if photo.description %}
          <p class="text-gray-800 text-sm p-2">{{ photo.description }}</p>
        {% endif %}
      </div>
    {% empty %}
      <p class="col-span-3 text-gray-600">Aucune photo disponible pour ce projet.</p>
    {% endfor %}
  </div>
</div>

{% endblock %}
